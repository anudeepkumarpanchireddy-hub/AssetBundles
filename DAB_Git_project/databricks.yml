# This is a Databricks asset bundle definition for DAB_Git_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: DAB_Git_project
  uuid: 46cd2b9f-9650-492b-b41e-0831a6b4636e

include:
  - resources/*.yml
  - resources/*/*.yml


# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-dd6ce202-8e41.cloud.databricks.com/
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-dd6ce202-8e41.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/anudeepkumarpanchireddy@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/anudeepkumarpanchireddy@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: anudeepkumarpanchireddy@gmail.com
        level: CAN_MANAGE
